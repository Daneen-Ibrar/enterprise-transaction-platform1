version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transaction-postgres
    environment:
      POSTGRES_DB: transaction_platform
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d transaction_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - platform-network

  redis:
    image: redis:7-alpine
    container_name: transaction-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - platform-network

  app:
    build: .
    container_name: transaction-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transaction_platform
      SPRING_DATASOURCE_USERNAME: platform_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - platform-network
    restart: on-failure

volumes:
  postgres_data:

networks:
  platform-network:
    driver: bridge